version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: wisterion-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wisterion
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wisterion-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/wisterion
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      STORAGE_TYPE: local
      EXPORTS_DIR: /app/exports
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./exports:/app/exports
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: wisterion-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
