name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing a feature! Please fill out the form below.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? Why is the current behavior insufficient?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you considered?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - Frontend (UI)
        - Backend (API)
        - AI / LLM
        - RAG / Evidence
        - Export
        - Authentication
        - Developer experience
        - Other
    validations:
      required: true
