version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: react
        update-types:
          - version-update:semver-major
      - dependency-name: react-dom
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/react"
        update-types:
          - version-update:semver-major
      - dependency-name: "@types/react-dom"
        update-types:
          - version-update:semver-major
    groups:
      frontend-patch-updates:
        patterns:
          - "*"
        update-types:
          - patch
      frontend-minor-updates:
        patterns:
          - "*"
        update-types:
          - minor

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    groups:
      backend-patch-updates:
        patterns:
          - "*"
        update-types:
          - patch
      backend-minor-updates:
        patterns:
          - "*"
        update-types:
          - minor
