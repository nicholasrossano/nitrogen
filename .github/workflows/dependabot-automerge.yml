name: Dependabot Automerge

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-safe-dependabot-pr:
    name: Merge safe Dependabot frontend updates
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    steps:
      - name: Merge if PR is safe (Dependabot frontend patch/minor)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No pull request attached to this workflow run."
            exit 0
          fi

          PR_JSON="$(gh api "repos/$REPO/pulls/$PR_NUMBER")"
          AUTHOR="$(echo "$PR_JSON" | jq -r '.user.login')"
          TITLE="$(echo "$PR_JSON" | jq -r '.title')"
          HEAD_REF="$(echo "$PR_JSON" | jq -r '.head.ref')"
          DRAFT="$(echo "$PR_JSON" | jq -r '.draft')"
          STATE="$(echo "$PR_JSON" | jq -r '.state')"

          if [ "$AUTHOR" != "dependabot[bot]" ]; then
            echo "Not a Dependabot PR ($AUTHOR)."
            exit 0
          fi

          if [ "$DRAFT" = "true" ] || [ "$STATE" != "open" ]; then
            echo "PR is draft or not open."
            exit 0
          fi

          case "$HEAD_REF" in
            dependabot/npm_and_yarn/frontend/*) ;;
            *)
              echo "Not a frontend npm Dependabot branch: $HEAD_REF"
              exit 0
              ;;
          esac

          # Title pattern example:
          # "Bump recharts from 3.8.0 to 3.8.1 in /frontend"
          FROM_VERSION="$(echo "$TITLE" | sed -nE 's/.* from ([^ ]+) to ([^ ]+) in \/frontend.*/\1/p')"
          TO_VERSION="$(echo "$TITLE" | sed -nE 's/.* from ([^ ]+) to ([^ ]+) in \/frontend.*/\2/p')"

          if [ -z "$FROM_VERSION" ] || [ -z "$TO_VERSION" ]; then
            echo "Could not parse dependency versions from title: $TITLE"
            exit 0
          fi

          FROM_MAJOR="$(echo "$FROM_VERSION" | sed -nE 's/^[^0-9]*([0-9]+).*/\1/p')"
          TO_MAJOR="$(echo "$TO_VERSION" | sed -nE 's/^[^0-9]*([0-9]+).*/\1/p')"

          if [ -z "$FROM_MAJOR" ] || [ -z "$TO_MAJOR" ]; then
            echo "Could not parse semver majors from $FROM_VERSION -> $TO_VERSION"
            exit 0
          fi

          if [ "$FROM_MAJOR" != "$TO_MAJOR" ]; then
            echo "Major update detected ($FROM_VERSION -> $TO_VERSION). Skipping."
            exit 0
          fi

          echo "Merging safe Dependabot PR #$PR_NUMBER ($FROM_VERSION -> $TO_VERSION)."
          gh pr merge --repo "$REPO" --squash --delete-branch "$PR_NUMBER"
